name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build universal macOS app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build universal app
        shell: bash
        run: |
          set -euo pipefail

          DERIVED_DATA_PATH="$RUNNER_TEMP/GeniusMacDerivedData"

          xcodebuild \
            -project Genius.xcodeproj \
            -scheme GeniusMac \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

          APP_PATH="$DERIVED_DATA_PATH/Build/Products/Release/GeniusMac.app"
          BINARY_PATH="$APP_PATH/Contents/MacOS/GeniusMac"

          test -d "$APP_PATH"
          lipo -verify_arch arm64 x86_64 "$BINARY_PATH"
          lipo -info "$BINARY_PATH"

          mkdir -p dist
          ditto -c -k --keepParent "$APP_PATH" "dist/GeniusMac-${GITHUB_REF_NAME:-manual}-macos-universal.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GeniusMac-macos-universal
          path: dist/*.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          gh release create "$GITHUB_REF_NAME" \
            dist/*.zip \
            --repo "$GITHUB_REPOSITORY" \
            --title "GeniusMac $GITHUB_REF_NAME" \
            --notes "Universal macOS build for Apple Silicon (arm64) and Intel (x86_64)."
