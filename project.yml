name: Genius
options:
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 5.9
    MACOSX_DEPLOYMENT_TARGET: "13.0"
targets:
  GeniusMac:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: GeniusMac
        excludes:
          - Resources/Info.plist
          - Resources/GeniusMac.entitlements
          - Resources/Config.json
          - Assets.xcassets
          - .DS_Store
      - path: GeniusMac/Resources/Config.json
        buildPhase: resources
      - path: GeniusMac/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: GeniusMac
        PRODUCT_BUNDLE_IDENTIFIER: com.genius.mac
        INFOPLIST_FILE: GeniusMac/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: GeniusMac/Resources/GeniusMac.entitlements
        GENERATE_INFOPLIST_FILE: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: NO
    scheme:
      gatherCoverageData: false
